version: "3"

services:
  backend:
    build: ./PrepX_NodeJS
    container_name: prepxbackend
    ports:
      - "8069:8000"
    volumes:
      - ./PrepX_NodeJS/logs:/app/logs
    env_file:
      - ./PrepX_NodeJS/.env
    restart: always

  frontend:
    build:
      context: ./PrepX_Frontend
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL}
    container_name: prepxfrontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prepxprometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend

  grafana:
    image: grafana/grafana
    container_name: prepxgrafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  grafana_data: