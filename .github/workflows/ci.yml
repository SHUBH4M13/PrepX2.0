name: PrepX CI - Scan Only

on:
  push:
    branches: [ "main" ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Image
        run: docker build -t prepx-backend ./PrepX_NodeJS

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: 'prepx-backend'
          severity: 'LOW,MEDIUM,HIGH,CRITICAL'
          exit-code: '0'